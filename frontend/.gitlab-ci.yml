stages:
  - install
  - build
  - test

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

variables:
  CI_DEBUG_TRACE: "false"
  NPM_CONFIG_REGISTRY: "https://registry.npmjs.org"

install_dependencies:
  stage: install
  image: node:lts
  script:
    - npm ci --prefer-offline
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  cache:
    paths:
      - node_modules/
    policy: push

build:
  stage: build
  image: node:lts
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  dependencies:
    - install_dependencies
  cache:
    paths:
      - node_modules/
    policy: pull

